<!DOCTYPE html>
<html>
<head>
    <title>Select Shop</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .selection-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        select { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>
    <div class="selection-card">
        <h2>🏬 Welcome, Admin</h2>
        <p>Manage inventory for:</p>
        <form action="/select_shop" method="POST">
            <select name="shop_name">
                {% for shop in shops %}
                <option value="{{ shop.shop_name }}">{{ shop.shop_name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Go to Dashboard</button>
        </form>
    </div>
</body>
</html>
